name: Deploy Backend

on:
  push:
    branches: [master]
    paths:
      - 'holyseed-backend/**'
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Sync live repo to origin/master
        run: |
          git -C /Users/jangseong-u/project/holyseed fetch origin master
          git -C /Users/jangseong-u/project/holyseed reset --hard origin/master

      - name: Install dependencies & build
        working-directory: /Users/jangseong-u/project/holyseed/holyseed-backend
        run: |
          npm install
          npm run build

      - name: Run migrations (스키마 생성 등 — synchronize가 못 하는 작업)
        working-directory: /Users/jangseong-u/project/holyseed/holyseed-backend
        run: NODE_ENV=production npm run migration:run

      - name: Restart pm2
        working-directory: /Users/jangseong-u/project/holyseed/holyseed-backend
        run: pm2 restart holyseed-backend --update-env

      - name: Health check
        run: |
          for i in $(seq 1 24); do
            if curl -sf http://127.0.0.1:8000/health > /dev/null; then
              echo "healthy after $((i * 5))s"
              exit 0
            fi
            sleep 5
          done
          echo "health check failed"
          pm2 logs holyseed-backend --lines 30 --nostream --err || true
          exit 1
