name: Nginx Config Reload

on:
  push:
    branches: [master]
    paths:
      - 'infra/nginx/**'
  workflow_dispatch:

jobs:
  reload:
    runs-on: self-hosted

    steps:
      - name: Sync live repo to origin/master
        run: |
          git -C /Users/jangseong-u/project/holyseed fetch origin master
          git -C /Users/jangseong-u/project/holyseed reset --hard origin/master

      - name: Validate Nginx config
        run: nginx -t

      - name: Reload Nginx
        run: nginx -s reload

      - name: Verify Nginx status
        run: |
          sleep 2
          curl -f https://holyseed.p-e.kr/health || exit 1
