# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name living-craft.p-e.kr;
    client_max_body_size 10M;

    # Let's Encrypt 인증용 경로
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
        allow all;
    }

    # 모든 HTTP 요청을 HTTPS로 리다이렉트
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS 서버
server {
    listen 443 ssl;
    http2 on;
    server_name living-craft.p-e.kr;
    client_max_body_size 10M;

    # SSL 인증서
    ssl_certificate /etc/letsencrypt/live/living-craft.p-e.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/living-craft.p-e.kr/privkey.pem;

    # SSL 설정 (최신 보안)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS (HTTPS 강제)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 로그
    access_log /usr/local/var/log/nginx/living-craft-access.log;
    error_log /usr/local/var/log/nginx/living-craft-error.log;

    # Health Check (prefix 없음)
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API 리버스 프록시
    location /api {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 업로드 파일 서빙
    location /uploads {
        alias /Users/jangseong-u/production/uploads;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Backoffice SPA
    location / {
        root /var/www/living-craft-backoffice;
        index index.html;
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # 보안 헤더
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
