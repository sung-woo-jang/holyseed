# HTTP → HTTPS 리다이렉트 (모든 서브도메인 공통)
server {
    listen 80;
    server_name living-craft.p-e.kr ad.living-craft.p-e.kr wedding.living-craft.p-e.kr;
    client_max_body_size 10M;

    # Let's Encrypt 인증용 경로
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
        allow all;
    }

    # 모든 HTTP 요청을 HTTPS로 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

# living-craft.p-e.kr (루트: API 서버, 업로드 파일)
server {
    listen 443 ssl;
    http2 on;
    server_name living-craft.p-e.kr;
    client_max_body_size 10M;

    ssl_certificate /etc/letsencrypt/live/living-craft.p-e.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/living-craft.p-e.kr/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    access_log /usr/local/var/log/nginx/living-craft-access.log;
    error_log /usr/local/var/log/nginx/living-craft-error.log;

    # Health Check (prefix 없음)
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API 리버스 프록시
    location /api {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 업로드 파일 서빙
    location /uploads {
        alias /Users/jangseong-u/production/uploads;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 루트: 아직 서빙할 서비스 없음
    location / {
        return 404;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}

# ad.living-craft.p-e.kr (자산일기 웹앱)
server {
    listen 443 ssl;
    http2 on;
    server_name ad.living-craft.p-e.kr;
    client_max_body_size 10M;

    ssl_certificate /etc/letsencrypt/live/living-craft.p-e.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/living-craft.p-e.kr/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    access_log /usr/local/var/log/nginx/ad-access.log;
    error_log /usr/local/var/log/nginx/ad-error.log;

    # API 리버스 프록시 (백엔드는 living-craft.p-e.kr:8000 로 통일)
    location /api {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 자산일기 SPA
    location / {
        root /var/www/ad-front;
        index index.html;
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}

