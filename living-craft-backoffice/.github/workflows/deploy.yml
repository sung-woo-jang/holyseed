name: Backoffice CI/CD

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Deploy to Nginx directory
        run: |
          rm -rf /var/www/living-craft-backoffice/*
          cp -r dist/* /var/www/living-craft-backoffice/

      - name: Verify deployment
        run: |
          sleep 2
          curl -f https://living-craft.p-e.kr || exit 1
